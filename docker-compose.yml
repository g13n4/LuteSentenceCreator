services:
  postgres:
    image: postgres:15.3
    restart: always
    ports:
      - "${POSTGRES_PORT}:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    command: -c "max_connections=100"

  sudachi:
    container_name: sudachi
    build:
      context: ./sudachi-rs
      dockerfile: Dockerfile
    volumes:
      - shared:"${SHARED_FOLDER}"

  sentence:
    container_name: sentence_creator
    build:
      context: ./sentence_creator
      dockerfile: Dockerfile
    volumes:
      - shared:"${SHARED_FOLDER}"
      - /resources:/resources
    depends_on:
      - sudachi
      - postgres

volumes:
  shared:
